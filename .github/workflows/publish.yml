name: Publish

# Publish to npm when a GitHub Release is published. Cut a release from a tag
# (e.g. v0.1.0) whose commit already passed CI; this re-gates with build + the
# Vitest suite, then publishes with provenance.
on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write # required for npm provenance (publishConfig.provenance)

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build UI bundle
        run: npm run build

      - name: Unit + component tests (Vitest)
        run: npm test

      # prepublishOnly rebuilds the bundle; --provenance is driven by
      # publishConfig.provenance + the id-token permission above.
      - name: Publish to npm
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
