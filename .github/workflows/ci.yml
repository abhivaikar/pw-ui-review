name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref (e.g. rapid pushes to a PR).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test (node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ['18', '20', '22']

    steps:
      # The unit and e2e suites need neither the ./demo submodule nor Git LFS:
      # unit tests use copied fixtures/tmpdirs and the e2e suite stubs the API
      # via page.route. So we skip submodules entirely for a fast checkout.
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Set up Node ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build UI bundle
        run: npm run build

      - name: Unit + component tests (Vitest)
        run: npm test

      # Only chromium is exercised (see playwright.config.ts). --with-deps pulls
      # the OS libraries the browser needs on the Ubuntu runner.
      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: End-to-end tests (Playwright)
        run: npm run test:e2e

      # Upload the HTML report whenever e2e ran, so failures are inspectable.
      # Name is per-Node to avoid artifact collisions across the matrix.
      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-node${{ matrix.node }}
          path: playwright-report/
          retention-days: 7
